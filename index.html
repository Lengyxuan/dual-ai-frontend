<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI智囊团 · 深度对抗式辩论引擎</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f4f8;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .status-bar {
            background: #ffffffdd;
            backdrop-filter: blur(8px);
            background: rgba(255,255,255,0.92);
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 24px;
            font-size: 14px;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: space-between;
        }
        .status-left { display: flex; align-items: center; gap: 12px; }
        .status-badge {
            background: #eef2ff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            color: #1e40af;
        }
        .settings-btn {
            background: #f1f5f9;
            border: none;
            border-radius: 24px;
            padding: 6px 16px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            color: #1e293b;
        }
        .settings-btn:hover { background: #e2e8f0; transform: translateY(-1px); }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .sidebar {
            width: 280px;
            background: #fff;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: #fefefe;
        }
        .sidebar-header {
            padding: 18px 16px;
            font-weight: 600;
            border-bottom: 1px solid #e2e8f0;
            background: #ffffff;
            color: #0f172a;
            font-size: 15px;
        }
        .history-list { flex: 1; padding: 12px; }
        .history-item {
            position: relative;
            background: #ffffff;
            border-radius: 12px;
            margin-bottom: 8px;
            padding: 12px 32px 12px 14px;
            transition: all 0.2s ease;
            cursor: pointer;
            border: 1px solid #eef2ff;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .history-item:hover { background: #f8fafc; border-color: #cbd5e1; transform: translateX(2px); }
        .history-item.active { background: #eef2ff; border-left: 3px solid #3b82f6; border-color: #3b82f6; }
        .history-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; word-break: break-word; color: #1e293b; }
        .history-time { font-size: 11px; color: #64748b; }
        .delete-session {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 20px;
            transition: all 0.2s;
        }
        .delete-session:hover { background: #fee2e2; color: #ef4444; }
        .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f8fafc; }
        .control-bar {
            display: flex;
            gap: 12px;
            padding: 12px 24px;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(4px);
            border-bottom: 1px solid #e2e8f0;
            flex-wrap: wrap;
            align-items: center;
        }
        .control-bar button {
            background: #ffffff;
            color: #1e293b;
            border: 1px solid #e2e8f0;
            border-radius: 28px;
            padding: 8px 18px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            box-shadow: 0 1px 1px rgba(0,0,0,0.02);
        }
        .control-bar button:hover:not(:disabled) { background: #f1f5f9; border-color: #cbd5e1; transform: translateY(-1px); }
        .control-bar button.primary { background: #3b82f6; color: white; border: none; }
        .round-badge {
            background: #eef2ff;
            border-radius: 24px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 500;
            color: #1e40af;
            margin-left: auto;
        }
        .messages-container { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 18px; }
        .message { display: flex; flex-direction: column; max-width: 82%; align-self: flex-start; animation: fadeInUp 0.2s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { align-self: flex-end; }
        .message.user .bubble {
            background: #3b82f6;
            color: white;
            border-radius: 20px 20px 6px 20px;
            padding: 12px 18px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .message.builder .bubble {
            background: #e6f7f0;
            color: #1a3c34;
            border-radius: 20px 20px 20px 6px;
            padding: 12px 18px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            border: 1px solid #c0e3d6;
        }
        .message.critic .bubble {
            background: #fff3e8;
            color: #4a2e1e;
            border-radius: 20px 20px 6px 20px;
            padding: 12px 18px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            border: 1px solid #ffdfc2;
        }
        .message-role { font-size: 12px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .message.builder .message-role { color: #2c7a5e; }
        .message.critic .message-role { color: #c26b2e; }
        .message.user .message-role { color: #3b82f6; justify-content: flex-end; }
        .message-content { line-height: 1.55; white-space: pre-wrap; word-break: break-word; font-size: 14px; }
        .typing-indicator {
            background: #ffffffcc;
            backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 10px 18px;
            font-size: 13px;
            color: #475569;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #e2e8f0;
        }
        .input-area {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(8px);
            border-top: 1px solid #e2e8f0;
            padding: 16px 24px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .input-box {
            flex: 1;
            border: 1px solid #cbd5e1;
            border-radius: 28px;
            padding: 12px 18px;
            resize: none;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
            background: #ffffff;
        }
        .input-box:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 32px;
            padding: 10px 24px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        button:hover:not(:disabled) { background: #2563eb; transform: translateY(-1px); }
        button:disabled { background: #94a3b8; cursor: not-allowed; opacity: 0.7; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #ffffff;
            border-radius: 28px;
            width: 500px;
            max-width: 90%;
            padding: 28px;
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.2);
        }
        .modal-content h3 { margin-bottom: 20px; font-size: 22px; font-weight: 600; color: #0f172a; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; color: #334155; }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 18px;
            font-size: 14px;
            transition: 0.2s;
        }
        .form-group input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.1); }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
        .test-btn { background: #f1f5f9; color: #1e293b; padding: 6px 14px; font-size: 12px; border-radius: 20px; }
        .test-status { font-size: 12px; margin-left: 10px; color: #10b981; }
        hr { margin: 18px 0; border-color: #eef2ff; }
        .inline-loading {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #cbd5e1;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .message.system_summary .bubble {
            background: #f1f5f9;
            color: #475569;
            border-radius: 20px;
            text-align: center;
            font-size: 13px;
            border: 1px dashed #cbd5e1;
        }
    </style>
</head>
<body>
<div class="status-bar">
    <div class="status-left">
        <span>🤖 AI智囊团 · 深度对抗式辩论引擎 </span>
        <span class="status-badge" id="statusText">就绪</span>
    </div>
    <button class="settings-btn" id="settingsBtn">⚙️ 设置</button>
</div>
<div class="main-layout">
    <div class="sidebar">
        <div class="sidebar-header">📚 历史会话</div>
        <div class="history-list" id="historyList"><div class="history-item">加载中...</div></div>
    </div>
    <div class="chat-area">
        <div class="control-bar">
            <button id="stopBtn" disabled>⏹️ 终止辩论</button>
            <button id="continueBtn" disabled>▶️ 继续讨论</button>
            <button id="newChatBtn">➕ 新建对话</button>
            <button id="resetBtn">🗑️ 清空对话</button>
            <div class="round-badge" id="roundInfo">⚙️ 最大轮数: 10</div>
        </div>
        <div class="messages-container" id="messagesContainer">
            <div style="text-align:center; color:#94a3b8; padding:40px;">✨ 发送消息，Builder 和 Critic 将逐轮反驳对方观点</div>
        </div>
        <div class="input-area">
            <textarea class="input-box" id="inputBox" rows="2" placeholder="输入你的观点或问题... (首轮Builder直接回应，之后每轮严格针对对方上一条发言)"></textarea>
            <button id="sendBtn">发送</button>
        </div>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>⚙️ API 设置</h3>
        <div class="form-group">
            <label>🌐 API Base URL (OpenAI 兼容)</label>
            <input type="text" id="backendUrlInput" placeholder="https://api.openai.com/v1">
            <div class="form-group" style="margin-top:8px;"><label>🤖 模型名称</label><input type="text" id="modelNameInput" placeholder="gpt-3.5-turbo"></div>
            <div style="margin-top: 8px;"><button type="button" class="test-btn" id="testBackendBtn">测试连接</button><span id="testResult" class="test-status"></span></div>
        </div>
        <hr>
        <div class="form-group"><label>🏗️ Builder API Key (构建者)</label><input type="password" id="apiKeyBuilder" placeholder="sk-..."></div>
        <div class="form-group"><label>🔍 Critic API Key (批判者)</label><input type="password" id="apiKeyCritic" placeholder="sk-..."></div>
        <div class="form-group"><label>🔁 最大辩论轮数 (每轮 = Builder+Critic 各一次)</label><input type="number" id="maxRoundsInput" min="1" max="20" value="10"></div>
        <div class="modal-buttons"><button id="closeSettingsBtn">取消</button><button id="saveSettingsBtn">保存</button></div>
        <div style="font-size:12px; color:#64748b; margin-top:12px;">💡 Builder 首轮回应问题，之后双方严格反驳上一条发言，并引入新论点</div>
    </div>
</div>

<script>
    // ======================= 全局配置 =======================
    let API_BASE_URL = 'https://api.openai.com/v1';
    let MODEL_NAME = 'gpt-3.5-turbo';
    let API_KEYS = { builder: '', critic: '' };
    let MAX_ROUNDS = 10;
    
    let fullHistory = [];
    let currentSessionId = null;
    let debateActive = false;
    let stopDebateFlag = false;
    let currentRound = 0;
    
    let autoScrollEnabled = true;
    const messagesContainer = document.getElementById('messagesContainer');
    const inputBox = document.getElementById('inputBox');
    const sendBtn = document.getElementById('sendBtn');
    const stopBtn = document.getElementById('stopBtn');
    const continueBtn = document.getElementById('continueBtn');
    const resetBtn = document.getElementById('resetBtn');
    const newChatBtn = document.getElementById('newChatBtn');
    const statusText = document.getElementById('statusText');
    const roundInfoSpan = document.getElementById('roundInfo');
    const settingsModal = document.getElementById('settingsModal');
    const settingsBtn = document.getElementById('settingsBtn');
    const closeSettingsBtn = document.getElementById('closeSettingsBtn');
    const saveSettingsBtn = document.getElementById('saveSettingsBtn');
    const testBackendBtn = document.getElementById('testBackendBtn');
    const testResultSpan = document.getElementById('testResult');
    const backendUrlInput = document.getElementById('backendUrlInput');
    const modelNameInput = document.getElementById('modelNameInput');
    const apiKeyBuilderInput = document.getElementById('apiKeyBuilder');
    const apiKeyCriticInput = document.getElementById('apiKeyCritic');
    const maxRoundsInput = document.getElementById('maxRoundsInput');

    // ======================= 智能滚动 =======================
    function isNearBottom() { const { scrollTop, scrollHeight, clientHeight } = messagesContainer; return scrollHeight - scrollTop - clientHeight < 100; }
    function handleUserScroll() { autoScrollEnabled = isNearBottom(); }
    function smartScrollToBottom() { if (autoScrollEnabled) messagesContainer.scrollTo({ top: messagesContainer.scrollHeight, behavior: 'smooth' }); }
    function forceScrollToBottom() { messagesContainer.scrollTo({ top: messagesContainer.scrollHeight, behavior: 'auto' }); }
    messagesContainer.addEventListener('scroll', handleUserScroll);
    
    function updateStatus(text, isLoading = false) { statusText.innerText = text; if(isLoading) statusText.innerHTML = text + ' <span class="inline-loading"></span>'; else statusText.innerText = text; }
    function escapeHtml(text) { if(!text) return ''; return text.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;').replace(/\n/g,'<br>'); }
    function createMessageElement(role, content) {
        const div = document.createElement('div'); div.className = `message ${role}`;
        let roleName = role === 'user' ? '👤 我' : (role === 'builder' ? '🏗️ 构建者' : (role === 'critic' ? '🔍 批判者' : role));
        div.innerHTML = `<div class="message-role">${roleName}</div><div class="bubble message-content">${escapeHtml(content)}</div>`;
        return div;
    }
    function renderFullConversation() {
        messagesContainer.innerHTML = '';
        if(fullHistory.length === 0) { messagesContainer.innerHTML = '<div style="text-align:center; color:#94a3b8; padding:40px;">✨ 发送消息，Builder 和 Critic 将逐轮反驳对方观点</div>'; }
        else { fullHistory.forEach(msg => messagesContainer.appendChild(createMessageElement(msg.role, msg.content))); }
        forceScrollToBottom(); autoScrollEnabled = true; syncContinueButton();
    }
    function appendSingleMessage(role, content, saveToHistory = true) {
        messagesContainer.appendChild(createMessageElement(role, content));
        smartScrollToBottom();
        if(saveToHistory) { fullHistory.push({ role, content }); saveCurrentSession(); }
        syncContinueButton();
    }
    let loadingIndicator = null;
    function showTyping(roleHint) { if(loadingIndicator) loadingIndicator.remove(); const div = document.createElement('div'); div.className = 'message builder'; div.id = 'typing-placeholder'; div.innerHTML = `<div class="message-role">${roleHint}</div><div class="typing-indicator">正在输入<span class="inline-loading"></span></div>`; messagesContainer.appendChild(div); smartScrollToBottom(); loadingIndicator = div; }
    function hideTyping() { if(loadingIndicator) { loadingIndicator.remove(); loadingIndicator = null; } }

    // ======================= 会话存储 =======================
    function saveCurrentSession() {
        if(fullHistory.length === 0) return;
        if(!currentSessionId) currentSessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2,6);
        const sessions = JSON.parse(localStorage.getItem('triple_ai_sessions_v2') || '[]');
        const title = fullHistory[0]?.content.substring(0,28) || '未命名辩论';
        const idx = sessions.findIndex(s => s.id === currentSessionId);
        const sessionData = { id: currentSessionId, title, history: [...fullHistory], lastUpdated: new Date().toISOString() };
        if(idx !== -1) sessions[idx] = sessionData; else sessions.unshift(sessionData);
        while(sessions.length > 30) sessions.pop();
        localStorage.setItem('triple_ai_sessions_v2', JSON.stringify(sessions));
        renderHistoryList();
    }
    function loadSession(sessionId) {
        if(debateActive) { updateStatus('请先终止辩论再加载会话'); return; }
        const sessions = JSON.parse(localStorage.getItem('triple_ai_sessions_v2') || '[]');
        const session = sessions.find(s => s.id === sessionId);
        if(session) { fullHistory = JSON.parse(JSON.stringify(session.history)); currentSessionId = session.id; renderFullConversation(); updateStatus(`已加载: ${session.title}`); debateActive = false; updateUIForDebateEnd(); }
    }
    function deleteSession(sessionId) {
        let sessions = JSON.parse(localStorage.getItem('triple_ai_sessions_v2') || '[]');
        sessions = sessions.filter(s => s.id !== sessionId);
        localStorage.setItem('triple_ai_sessions_v2', JSON.stringify(sessions));
        if(currentSessionId === sessionId) { fullHistory = []; currentSessionId = null; renderFullConversation(); updateStatus('当前会话已删除'); }
        renderHistoryList();
        if(sessions.length === 0) document.getElementById('historyList').innerHTML = '<div class="history-item">暂无历史</div>';
    }
    function newConversation() {
        if(debateActive) { updateStatus('请先终止辩论再新建对话'); return; }
        if(fullHistory.length > 0 && currentSessionId) saveCurrentSession();
        fullHistory = []; currentSessionId = null; renderFullConversation(); updateStatus('已创建新对话'); updateUIForDebateEnd(); roundInfoSpan.innerText = `⚙️ 最大轮数: ${MAX_ROUNDS}`; renderHistoryList();
    }
    function resetConversation() {
        if(debateActive) { stopDebateFlag = true; debateActive = false; }
        fullHistory = [];
        if(currentSessionId) { let sessions = JSON.parse(localStorage.getItem('triple_ai_sessions_v2') || '[]'); sessions = sessions.filter(s => s.id !== currentSessionId); localStorage.setItem('triple_ai_sessions_v2', JSON.stringify(sessions)); currentSessionId = null; }
        renderFullConversation(); updateStatus('对话已清空'); updateUIForDebateEnd(); roundInfoSpan.innerText = `⚙️ 最大轮数: ${MAX_ROUNDS}`; renderHistoryList();
    }
    function renderHistoryList() {
        const historyDiv = document.getElementById('historyList'); if(!historyDiv) return;
        const sessions = JSON.parse(localStorage.getItem('triple_ai_sessions_v2') || '[]');
        if(sessions.length === 0) { historyDiv.innerHTML = '<div class="history-item">暂无历史</div>'; return; }
        historyDiv.innerHTML = '';
        sessions.slice().reverse().forEach(session => {
            const div = document.createElement('div'); div.className = 'history-item'; if(currentSessionId === session.id) div.classList.add('active');
            const contentDiv = document.createElement('div'); contentDiv.style.cursor = 'pointer'; contentDiv.innerHTML = `<div class="history-title">${escapeHtml(session.title)}</div><div class="history-time">${new Date(session.lastUpdated).toLocaleString()}</div>`;
            contentDiv.onclick = () => loadSession(session.id);
            div.appendChild(contentDiv);
            const delBtn = document.createElement('button'); delBtn.innerHTML = '🗑️'; delBtn.className = 'delete-session'; delBtn.onclick = (e) => { e.stopPropagation(); if(confirm('删除会话?')) deleteSession(session.id); }; div.appendChild(delBtn);
            historyDiv.appendChild(div);
        });
    }
    function syncContinueButton() { continueBtn.disabled = (fullHistory.length === 0) || debateActive; }

    // ======================= 核心辩论逻辑（强化逐轮反驳，避免重复） =======================
    // 构建完整对话上下文
    function buildContextForModel() {
        const context = [];
        for(const msg of fullHistory) {
            let role = msg.role === 'user' ? 'user' : 'assistant';
            if(msg.role === 'builder' || msg.role === 'critic') role = 'assistant';
            else if(msg.role !== 'user') continue;
            context.push({ role, content: msg.content });
        }
        return context;
    }
    
    // 判断当前是第几轮（用于系统提示动态调整）
    // 通过 fullHistory 中 builder+critic 的消息数量来判断已完成的轮次
    function getCurrentDebateRound() {
        let pairCount = 0;
        for(let i=0; i<fullHistory.length; i++) {
            if(fullHistory[i].role === 'builder' && (i+1 < fullHistory.length && fullHistory[i+1].role === 'critic')) {
                pairCount++;
                i++; // 跳过下一个
            } else if(fullHistory[i].role === 'critic') {
                // 单独的critic也算半轮？简化处理
            }
        }
        return pairCount; // 已完成的完整轮数
    }
    
    // 改进后的系统提示：根据是否为首轮动态调整
    // 由于每次调用时 fullHistory 已包含最新消息，我们可以在提示中描述行为
    const BUILDER_SYSTEM_BASE = `你是一位资深「构建者」，擅长提出创新、可行、建设性的方案。你的发言必须严格遵循以下规则：
1. 如果这是对话中你的第一次发言（即用户刚刚提出问题，还没有任何构建者或批判者的回复），请直接针对用户的问题给出清晰、有深度的建设性观点或解决方案。不要评价批判者，因为批判者尚未发言。
2. 如果之前已经有批判者或构建者发言，那么你必须针对上一条消息（通常是批判者的质疑）进行回应：先明确指出你回应的是哪一点，然后提出反驳、补充证据或深化论点。严禁重复之前自己或其他角色已经说过的内容，必须引入新的事实、逻辑或视角。
3. 每次发言都要展现出你理解了对方的核心论点，并给出有针对性的回应。避免泛泛而谈，保持专业和建设性。
4. 直接输出你的回应，不要添加任何前缀或元说明。`;
    
    const CRITIC_SYSTEM_BASE = `你是一位严谨的「批判者」，擅长发现逻辑漏洞、潜在风险与不足之处。你的发言必须严格遵循以下规则：
1. 如果这是对话中你的第一次发言（即构建者刚刚给出了对用户问题的回应），请针对构建者的观点提出尖锐且建设性的质疑、补充反例或风险警告。明确指出你认为有问题的部分。
2. 如果之前已经有批判者或构建者发言，那么你必须针对上一条消息（通常是构建者的新论点）进行回应：先复述你理解的对方核心观点，然后指出其中的逻辑缺陷、证据不足或潜在风险。严禁重复之前已经提出过的质疑，必须挖掘新的问题或更深层次的风险。
3. 每次发言都要展现批判性思维，避免情绪化，保持客观和专业。
4. 直接输出你的回应，不要添加任何前缀或元说明。`;
    
    // 动态拼接提示，加上“禁止重复”强化
    const getBuilderPrompt = () => BUILDER_SYSTEM_BASE;
    const getCriticPrompt = () => CRITIC_SYSTEM_BASE;
    
    async function callLLM(apiKey, systemPrompt, conversationHistory, roleName) {
        if(!apiKey) throw new Error(`缺少 ${roleName} 的 API Key`);
        const url = `${API_BASE_URL}/chat/completions`;
        const messages = [{ role: 'system', content: systemPrompt }, ...conversationHistory];
        // 提升 temperature 到 0.85 增加回答多样性，避免循环相似
        const payload = { model: MODEL_NAME, messages, temperature: 0.85, max_tokens: 900 };
        const controller = new AbortController(); const timeoutId = setTimeout(() => controller.abort(), 45000);
        try {
            const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` }, body: JSON.stringify(payload), signal: controller.signal });
            clearTimeout(timeoutId);
            if(!response.ok) { const errText = await response.text(); throw new Error(`API错误 ${response.status}: ${errText.substring(0,150)}`); }
            const data = await response.json();
            if(data.choices && data.choices[0]?.message) return data.choices[0].message.content.trim();
            throw new Error('无效响应格式');
        } catch(err) { clearTimeout(timeoutId); throw err; }
    }
    
    async function invokeBuilder() {
        const ctx = buildContextForModel();
        if(ctx.length === 0) throw new Error("无上下文");
        // 在上下文中附加一个隐式的指令，强调不要重复（通过系统提示已覆盖）
        return await callLLM(API_KEYS.builder, getBuilderPrompt(), ctx, 'Builder');
    }
    async function invokeCritic() {
        const ctx = buildContextForModel();
        if(ctx.length === 0) throw new Error("无上下文");
        return await callLLM(API_KEYS.critic, getCriticPrompt(), ctx, 'Critic');
    }
    
    async function runDebateCycle() {
        if(debateActive) return;
        if(!API_KEYS.builder || !API_KEYS.critic) {
            appendSingleMessage('system_summary', '⚠️ 请先在设置中填写 Builder 和 Critic 的 API Key', false);
            settingsModal.classList.add('active'); return;
        }
        if(fullHistory.length === 0) { appendSingleMessage('system_summary', '💡 没有对话内容，请先发送一条消息开始讨论', false); return; }
        debateActive = true; stopDebateFlag = false; currentRound = 0;
        updateUIForDebateStart(); updateStatus('辩论进行中（逐轮反驳，禁止重复）...', true);
        try {
            while(!stopDebateFlag && currentRound < MAX_ROUNDS) {
                if(stopDebateFlag) break;
                showTyping('🏗️ 构建者正在针对上一条观点反驳/深化...');
                let builderReply = await invokeBuilder();
                hideTyping();
                appendSingleMessage('builder', builderReply || "(Builder 未生成内容)", true);
                if(stopDebateFlag) break;
                showTyping('🔍 批判者正在针对上一条观点质疑...');
                let criticReply = await invokeCritic();
                hideTyping();
                appendSingleMessage('critic', criticReply || "(Critic 未生成内容)", true);
                currentRound++;
                roundInfoSpan.innerText = `⚙️ 当前轮数: ${currentRound}/${MAX_ROUNDS}`;
                if(stopDebateFlag) break;
                await new Promise(r => setTimeout(r, 350)); // 稍微增加间隔
            }
            if(stopDebateFlag) { updateStatus('辩论已终止'); appendSingleMessage('system_summary', '⏸️ 用户终止了辩论，你可以点击【继续讨论】或发送新消息', false); }
            else if(currentRound >= MAX_ROUNDS) { updateStatus('辩论达到最大轮数'); appendSingleMessage('system_summary', `🏁 已达到最大辩论轮数 (${MAX_ROUNDS})，你可以点击【继续讨论】继续辩论`, false); }
        } catch(err) { updateStatus(`辩论出错: ${err.message}`); appendSingleMessage('system_summary', `⚠️ 辩论中断: ${err.message}`, false); }
        finally { debateActive = false; stopDebateFlag = false; updateUIForDebateEnd(); roundInfoSpan.innerText = `⚙️ 最大轮数: ${MAX_ROUNDS}`; }
    }
    
    async function sendUserMessageAndStartDebate() {
        if(debateActive) { updateStatus('辩论进行中，请先点击【终止辩论】再发送新消息'); return; }
        const question = inputBox.value.trim(); if(!question) return;
        inputBox.value = '';
        appendSingleMessage('user', question, true);
        await runDebateCycle();
    }
    function stopDebate() { if(!debateActive) updateStatus('当前没有进行中的辩论'); else { stopDebateFlag = true; updateStatus('正在终止辩论...'); } }
    async function continueDebate() { if(debateActive) { updateStatus('辩论已在运行中'); return; } if(fullHistory.length === 0) { updateStatus('没有对话历史，请先发送消息'); return; } await runDebateCycle(); }
    function updateUIForDebateStart() { sendBtn.disabled = true; stopBtn.disabled = false; continueBtn.disabled = true; resetBtn.disabled = true; newChatBtn.disabled = true; }
    function updateUIForDebateEnd() { sendBtn.disabled = false; stopBtn.disabled = true; continueBtn.disabled = (fullHistory.length === 0) || debateActive; resetBtn.disabled = false; newChatBtn.disabled = false; if(!debateActive) updateStatus('就绪'); }
    
    // ======================= 设置 =======================
    function saveSettings() {
        const newBase = backendUrlInput.value.trim(); if(newBase) API_BASE_URL = newBase.replace(/\/$/, '');
        const newModel = modelNameInput.value.trim(); if(newModel) MODEL_NAME = newModel;
        API_KEYS = { builder: apiKeyBuilderInput.value.trim(), critic: apiKeyCriticInput.value.trim() };
        const maxR = parseInt(maxRoundsInput.value,10); if(!isNaN(maxR) && maxR>0) MAX_ROUNDS = Math.min(maxR,20);
        roundInfoSpan.innerText = `⚙️ 最大轮数: ${MAX_ROUNDS}`;
        localStorage.setItem('triple_ai_settings_v2', JSON.stringify({ baseUrl:API_BASE_URL, model:MODEL_NAME, apiKeys:API_KEYS, maxRounds:MAX_ROUNDS }));
        updateStatus('设置已保存'); updateUIForDebateEnd();
    }
    function loadSettings() {
        const saved = localStorage.getItem('triple_ai_settings_v2');
        if(saved) try { const s=JSON.parse(saved); if(s.baseUrl) API_BASE_URL=s.baseUrl; if(s.model) MODEL_NAME=s.model; if(s.apiKeys) API_KEYS=s.apiKeys; if(s.maxRounds) MAX_ROUNDS=s.maxRounds; } catch(e) {}
        backendUrlInput.value = API_BASE_URL; modelNameInput.value = MODEL_NAME;
        apiKeyBuilderInput.value = API_KEYS.builder || ''; apiKeyCriticInput.value = API_KEYS.critic || '';
        maxRoundsInput.value = MAX_ROUNDS; roundInfoSpan.innerText = `⚙️ 最大轮数: ${MAX_ROUNDS}`;
    }
    async function testConnection() {
        const url = backendUrlInput.value.trim(); if(!url){ testResultSpan.innerText='❌ 请输入Base URL'; return; }
        const model = modelNameInput.value.trim() || 'gpt-3.5-turbo';
        const testKey = apiKeyBuilderInput.value.trim() || apiKeyCriticInput.value.trim();
        if(!testKey){ testResultSpan.innerText='❌ 请至少填写一个 API Key 进行测试'; return; }
        testResultSpan.innerText='⏳ 测试中...';
        try {
            const testUrl=`${url.replace(/\/$/,'')}/chat/completions`;
            const res=await fetch(testUrl,{ method:'POST', headers:{ 'Content-Type':'application/json','Authorization':`Bearer ${testKey}` }, body:JSON.stringify({ model, messages:[{ role:'user', content:'Hi' }], max_tokens:5 }) });
            if(res.ok) { testResultSpan.innerText='✅ API 连通正常'; testResultSpan.style.color='#10b981'; }
            else { testResultSpan.innerText=`⚠️ ${res.status}`; testResultSpan.style.color='#ef4444'; }
        } catch(e){ testResultSpan.innerText=`❌ 连接失败: ${e.message}`; testResultSpan.style.color='#ef4444'; }
    }
    
    // 事件绑定
    sendBtn.onclick = sendUserMessageAndStartDebate;
    stopBtn.onclick = stopDebate;
    continueBtn.onclick = continueDebate;
    resetBtn.onclick = resetConversation;
    newChatBtn.onclick = newConversation;
    settingsBtn.onclick = () => settingsModal.classList.add('active');
    closeSettingsBtn.onclick = () => settingsModal.classList.remove('active');
    saveSettingsBtn.onclick = () => { saveSettings(); settingsModal.classList.remove('active'); };
    testBackendBtn.onclick = testConnection;
    settingsModal.onclick = (e) => { if(e.target === settingsModal) settingsModal.classList.remove('active'); };
    inputBox.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendUserMessageAndStartDebate(); } });
    
    // 初始化
    loadSettings();
    const sessions = JSON.parse(localStorage.getItem('triple_ai_sessions_v2') || '[]');
    if(sessions.length > 0) loadSession(sessions[0].id);
    else resetConversation();
    updateUIForDebateEnd();
    syncContinueButton();
</script>
</body>
</html>
