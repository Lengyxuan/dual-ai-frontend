<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>三AI智囊团 · 双角色辩论引擎</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f7f9fc;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .status-bar {
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 24px;
            font-size: 14px;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: space-between;
        }
        .status-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .status-badge {
            background: #e2e8f0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .settings-btn {
            background: #f1f5f9;
            border: none;
            border-radius: 20px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 280px;
            background: #fff;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .sidebar-header {
            padding: 16px;
            font-weight: 600;
            border-bottom: 1px solid #e2e8f0;
        }
        .history-list {
            flex: 1;
            padding: 12px;
        }
        .history-item {
            position: relative;
            background: #f8fafc;
            border-radius: 8px;
            margin-bottom: 8px;
            padding: 10px 32px 10px 12px;
            transition: background 0.2s;
            cursor: pointer;
        }
        .history-item:hover {
            background: #eef2ff;
        }
        .history-item.active {
            background: #e0e7ff;
            border-left: 3px solid #3b82f6;
        }
        .history-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            word-break: break-word;
        }
        .history-time {
            font-size: 11px;
            color: #64748b;
        }
        .delete-session {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 6px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .delete-session:hover {
            background: #fee2e2;
            color: #ef4444;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .control-bar {
            display: flex;
            gap: 12px;
            padding: 12px 20px;
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            flex-wrap: wrap;
            align-items: center;
        }
        .control-bar button {
            background: #f1f5f9;
            color: #1e293b;
            border: none;
            border-radius: 24px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        .control-bar button.primary {
            background: #3b82f6;
            color: white;
        }
        .round-badge {
            background: #e2e8f0;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 13px;
            margin-left: auto;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            align-self: flex-start;
        }
        .message.user {
            align-self: flex-end;
        }
        .message.user .bubble {
            background: #3b82f6;
            color: white;
            border-radius: 18px;
            padding: 10px 16px;
        }
        .message.builder .bubble, .message.critic .bubble {
            background: #fff;
            border-radius: 12px;
            padding: 12px 16px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .message-role {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #475569;
        }
        .message-content {
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .typing-indicator {
            background: #f1f5f9;
            border-radius: 18px;
            padding: 10px 16px;
            font-size: 13px;
            color: #475569;
            display: inline-block;
        }
        .input-area {
            background: #fff;
            border-top: 1px solid #e2e8f0;
            padding: 16px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .input-box {
            flex: 1;
            border: 1px solid #cbd5e1;
            border-radius: 24px;
            padding: 12px 16px;
            resize: none;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }
        .input-box:focus {
            border-color: #3b82f6;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 24px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #fff;
            border-radius: 20px;
            width: 500px;
            max-width: 90%;
            padding: 24px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }
        .modal-content h3 {
            margin-bottom: 20px;
            font-size: 20px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #1e293b;
        }
        .form-group input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 14px;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
        }
        .test-btn {
            background: #e2e8f0;
            color: #1e293b;
            padding: 6px 12px;
            font-size: 12px;
        }
        .test-status {
            font-size: 12px;
            margin-left: 8px;
            color: #10b981;
        }
        hr {
            margin: 16px 0;
            border-color: #e2e8f0;
        }
        .inline-loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #e2e8f0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="status-bar">
    <div class="status-left">
        <span>🤖 三AI智囊团 · 双角色辩论引擎 (Builder vs Critic)</span>
        <span class="status-badge" id="statusText">就绪</span>
    </div>
    <button class="settings-btn" id="settingsBtn">⚙️ 设置</button>
</div>
<div class="main-layout">
    <div class="sidebar">
        <div class="sidebar-header">📚 历史会话</div>
        <div class="history-list" id="historyList">
            <div class="history-item">加载中...</div>
        </div>
    </div>
    <div class="chat-area">
        <div class="control-bar">
            <button id="stopBtn" disabled>⏹️ 终止辩论</button>
            <button id="newChatBtn">➕ 新建对话</button>
            <button id="resetBtn">🗑️ 清空对话</button>
            <div class="round-badge" id="roundInfo">⚙️ 最大轮数: 10</div>
        </div>
        <div class="messages-container" id="messagesContainer">
            <div style="text-align:center; color:#94a3b8; padding:40px;">✨ 发送消息，Builder 和 Critic 将自动展开讨论</div>
        </div>
        <div class="input-area">
            <textarea class="input-box" id="inputBox" rows="2" placeholder="输入你的观点或问题... (发送后将触发双角色循环辩论)"></textarea>
            <button id="sendBtn">发送</button>
        </div>
    </div>
</div>

<!-- 设置模态框 -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>⚙️ API 设置 (直接调用大模型)</h3>
        <div class="form-group">
            <label>🌐 API Base URL (OpenAI 兼容)</label>
            <input type="text" id="backendUrlInput" placeholder="https://api.openai.com/v1">
            <div class="form-group" style="margin-top:8px;">
                <label>🤖 模型名称 (建议 gpt-3.5-turbo / gpt-4o-mini)</label>
                <input type="text" id="modelNameInput" placeholder="gpt-3.5-turbo">
            </div>
            <div style="margin-top: 8px;">
                <button type="button" class="test-btn" id="testBackendBtn">测试连接 (简单验证)</button>
                <span id="testResult" class="test-status"></span>
            </div>
        </div>
        <hr>
        <div class="form-group">
            <label>🏗️ Builder API Key (构建者)</label>
            <input type="password" id="apiKeyBuilder" placeholder="sk-...">
        </div>
        <div class="form-group">
            <label>🔍 Critic API Key (批判者)</label>
            <input type="password" id="apiKeyCritic" placeholder="sk-...">
        </div>
        <div class="form-group">
            <label>🔁 最大辩论轮数 (每轮 = Builder+Critic 各一次)</label>
            <input type="number" id="maxRoundsInput" min="1" max="20" value="10">
        </div>
        <div class="modal-buttons">
            <button id="closeSettingsBtn">取消</button>
            <button id="saveSettingsBtn">保存</button>
        </div>
        <div style="font-size:12px; color:#64748b; margin-top:12px;">💡 提示：API Key 分别隔离，Builder 和 Critic 使用各自密钥，base URL 需支持 /chat/completions</div>
    </div>
</div>

<script>
    // ======================= 全局配置 =======================
    let API_BASE_URL = 'https://api.openai.com/v1';    // OpenAI 兼容地址
    let MODEL_NAME = 'gpt-3.5-turbo';
    let API_KEYS = {
        builder: '',
        critic: ''
    };
    let MAX_ROUNDS = 10;            // 最大辩论轮数
    
    // 全局状态
    let fullHistory = [];            // 存储 { role, content }  role: user, builder, critic
    let debateActive = false;        // 辩论循环是否活跃
    let stopDebateFlag = false;      // 终止标志
    let currentDebatePromise = null;
    let currentRound = 0;
    
    // DOM 元素
    const messagesContainer = document.getElementById('messagesContainer');
    const inputBox = document.getElementById('inputBox');
    const sendBtn = document.getElementById('sendBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resetBtn = document.getElementById('resetBtn');
    const newChatBtn = document.getElementById('newChatBtn');
    const statusText = document.getElementById('statusText');
    const roundInfoSpan = document.getElementById('roundInfo');
    const settingsModal = document.getElementById('settingsModal');
    const settingsBtn = document.getElementById('settingsBtn');
    const closeSettingsBtn = document.getElementById('closeSettingsBtn');
    const saveSettingsBtn = document.getElementById('saveSettingsBtn');
    const testBackendBtn = document.getElementById('testBackendBtn');
    const testResultSpan = document.getElementById('testResult');
    const backendUrlInput = document.getElementById('backendUrlInput');
    const modelNameInput = document.getElementById('modelNameInput');
    const apiKeyBuilderInput = document.getElementById('apiKeyBuilder');
    const apiKeyCriticInput = document.getElementById('apiKeyCritic');
    const maxRoundsInput = document.getElementById('maxRoundsInput');

    // ======================= 辅助函数 =======================
    function updateStatus(text, isLoading = false) {
        statusText.innerText = text;
        if(isLoading) statusText.innerHTML = text + ' <span class="inline-loading"></span>';
        else statusText.innerText = text;
    }
    function scrollToBottom() { messagesContainer.scrollTop = messagesContainer.scrollHeight; }
    function escapeHtml(text) {
        if(!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/\n/g, '<br>');
    }

    function createMessageElement(role, content) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        let roleName = '';
        if (role === 'user') roleName = '👤 我';
        else if (role === 'builder') roleName = '🏗️ 构建者';
        else if (role === 'critic') roleName = '🔍 批判者';
        else roleName = role;
        div.innerHTML = `
            <div class="message-role">${roleName}</div>
            <div class="bubble message-content">${escapeHtml(content)}</div>
        `;
        return div;
    }

    function renderFullConversation() {
        messagesContainer.innerHTML = '';
        if(fullHistory.length === 0) {
            messagesContainer.innerHTML = '<div style="text-align:center; color:#94a3b8; padding:40px;">✨ 发送消息，Builder 和 Critic 将自动展开讨论</div>';
            return;
        }
        fullHistory.forEach(msg => {
            const el = createMessageElement(msg.role, msg.content);
            messagesContainer.appendChild(el);
        });
        scrollToBottom();
        autoSaveSession();
    }

    function appendSingleMessage(role, content, saveToHistory = true) {
        const el = createMessageElement(role, content);
        messagesContainer.appendChild(el);
        scrollToBottom();
        if(saveToHistory) {
            fullHistory.push({ role, content });
            autoSaveSession();
        }
    }

    // 显示/隐藏加载占位
    let loadingIndicator = null;
    function showTyping(roleHint = '🤔 思考中') {
        if(loadingIndicator) loadingIndicator.remove();
        const div = document.createElement('div');
        div.className = 'message builder';
        div.id = 'typing-placeholder';
        div.innerHTML = `<div class="message-role">${roleHint}</div><div class="typing-indicator">正在输入<span class="inline-loading"></span></div>`;
        messagesContainer.appendChild(div);
        scrollToBottom();
        loadingIndicator = div;
    }
    function hideTyping() {
        if(loadingIndicator) { loadingIndicator.remove(); loadingIndicator = null; }
    }

    // ======================= LLM 调用核心 (直接调用API) =======================
    async function callLLM(apiKey, systemPrompt, conversationHistory, roleName = 'assistant') {
        if(!apiKey) throw new Error(`缺少 ${roleName} 的 API Key`);
        const url = `${API_BASE_URL}/chat/completions`;
        const messages = [
            { role: 'system', content: systemPrompt },
            ...conversationHistory
        ];
        const payload = {
            model: MODEL_NAME,
            messages: messages,
            temperature: 0.7,
            max_tokens: 800,
        };
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 45000);
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify(payload),
                signal: controller.signal
            });
            clearTimeout(timeoutId);
            if(!response.ok) {
                const errText = await response.text();
                throw new Error(`API错误 ${response.status}: ${errText.substring(0, 150)}`);
            }
            const data = await response.json();
            if(data.choices && data.choices[0] && data.choices[0].message) {
                return data.choices[0].message.content.trim();
            } else {
                throw new Error('无效响应格式');
            }
        } catch(err) {
            clearTimeout(timeoutId);
            throw err;
        }
    }

    // 构建当前对话上下文 (用于传递给模型，不含系统提示)
    function buildContextForModel() {
        const context = [];
        for(const msg of fullHistory) {
            let role = 'user';
            if(msg.role === 'builder') role = 'assistant';
            else if(msg.role === 'critic') role = 'assistant';
            else if(msg.role === 'user') role = 'user';
            else continue;
            context.push({ role, content: msg.content });
        }
        return context;
    }

    // 系统提示: 角色隔离
    const BUILDER_SYSTEM = `你是一位资深「构建者」，擅长提出创新、可行、建设性的方案。你的任务是针对当前讨论话题，给出清晰、有深度的观点、解决方案或补充建议。要注重逻辑和实用性，同时保持开放态度。请直接输出你的观点，不要重复之前的对话，不要扮演批判者。`;
    const CRITIC_SYSTEM = `你是一位严谨的「批判者」，擅长发现逻辑漏洞、潜在风险与不足之处。你的任务是对构建者或当前讨论的观点提出尖锐且建设性的质疑、补充反例或风险警告，推动讨论更加完善。请直接输出批判性意见，不要重复对方，保持专业与客观。`;

    // 单次 Builder 发言
    async function invokeBuilder() {
        const context = buildContextForModel();
        if(context.length === 0) throw new Error("无上下文");
        return await callLLM(API_KEYS.builder, BUILDER_SYSTEM, context, 'Builder');
    }
    // 单次 Critic 发言 (基于最新历史)
    async function invokeCritic() {
        const context = buildContextForModel();
        if(context.length === 0) throw new Error("无上下文");
        return await callLLM(API_KEYS.critic, CRITIC_SYSTEM, context, 'Critic');
    }

    // ======================= 辩论循环引擎 =======================
    async function runDebateCycle() {
        if(debateActive) return;
        if(!API_KEYS.builder || !API_KEYS.critic) {
            appendSingleMessage('system_summary', '⚠️ 请先在设置中填写 Builder 和 Critic 的 API Key', false);
            settingsModal.classList.add('active');
            return;
        }
        if(MAX_ROUNDS <= 0) MAX_ROUNDS = 10;
        debateActive = true;
        stopDebateFlag = false;
        currentRound = 0;
        updateUIForDebateStart();
        updateStatus('辩论进行中...', true);
        
        try {
            while(!stopDebateFlag && currentRound < MAX_ROUNDS) {
                // Builder 发言
                if(stopDebateFlag) break;
                showTyping('🏗️ 构建者思考中');
                let builderReply = '';
                try {
                    builderReply = await invokeBuilder();
                } catch(err) {
                    hideTyping();
                    appendSingleMessage('system_summary', `❌ Builder 调用失败: ${err.message}`, false);
                    throw err;
                }
                hideTyping();
                if(!builderReply) builderReply = "(Builder 未生成内容)";
                appendSingleMessage('builder', builderReply, true);
                
                if(stopDebateFlag) break;
                
                // Critic 发言
                showTyping('🔍 批判者思考中');
                let criticReply = '';
                try {
                    criticReply = await invokeCritic();
                } catch(err) {
                    hideTyping();
                    appendSingleMessage('system_summary', `❌ Critic 调用失败: ${err.message}`, false);
                    throw err;
                }
                hideTyping();
                if(!criticReply) criticReply = "(Critic 未生成内容)";
                appendSingleMessage('critic', criticReply, true);
                
                currentRound++;
                roundInfoSpan.innerText = `⚙️ 当前轮数: ${currentRound}/${MAX_ROUNDS}`;
                if(stopDebateFlag) break;
                
                // 轮次间隔友好
                await new Promise(r => setTimeout(r, 300));
            }
            
            if(stopDebateFlag) {
                updateStatus('辩论已终止', false);
                appendSingleMessage('system_summary', '⏸️ 用户终止了辩论，你可以继续发言开启新一轮讨论', false);
            } else if(currentRound >= MAX_ROUNDS) {
                updateStatus('辩论达到最大轮数', false);
                appendSingleMessage('system_summary', `🏁 已达到最大辩论轮数 (${MAX_ROUNDS})，你可以继续发言开启新一轮讨论`, false);
            }
        } catch(err) {
            console.error(err);
            updateStatus(`辩论出错: ${err.message}`, false);
            appendSingleMessage('system_summary', `⚠️ 辩论中断: ${err.message}`, false);
        } finally {
            debateActive = false;
            stopDebateFlag = false;
            updateUIForDebateEnd();
            roundInfoSpan.innerText = `⚙️ 最大轮数: ${MAX_ROUNDS}`;
        }
    }

    // 用户发送新消息 (启动辩论)
    async function sendUserMessageAndStartDebate() {
        if(debateActive) {
            updateStatus('辩论进行中，请先点击【终止辩论】再发送新消息');
            return;
        }
        const question = inputBox.value.trim();
        if(!question) return;
        inputBox.value = '';
        // 添加用户消息
        appendSingleMessage('user', question, true);
        // 启动辩论循环
        await runDebateCycle();
    }

    // 终止辩论
    function stopDebate() {
        if(!debateActive) {
            updateStatus('当前没有进行中的辩论');
            return;
        }
        stopDebateFlag = true;
        updateStatus('正在终止辩论...');
    }

    // 重置所有 (清空对话)
    function resetConversation() {
        if(debateActive) {
            stopDebateFlag = true;
            debateActive = false;
        }
        fullHistory = [];
        currentRound = 0;
        renderFullConversation();
        updateStatus('对话已清空');
        updateUIForDebateEnd();
        roundInfoSpan.innerText = `⚙️ 最大轮数: ${MAX_ROUNDS}`;
        autoSaveSession();
    }

    function newConversation() {
        if(debateActive) {
            updateStatus('请先终止辩论再新建');
            return;
        }
        resetConversation();
        updateStatus('新对话已创建');
    }

    // UI 状态控制
    function updateUIForDebateStart() {
        sendBtn.disabled = true;
        stopBtn.disabled = false;
        resetBtn.disabled = true;
        newChatBtn.disabled = true;
    }
    function updateUIForDebateEnd() {
        sendBtn.disabled = false;
        stopBtn.disabled = true;
        resetBtn.disabled = false;
        newChatBtn.disabled = false;
        if(!debateActive) updateStatus('就绪');
    }

    // ======================= 设置与本地存储 =======================
    function saveSettings() {
        const newBase = backendUrlInput.value.trim();
        if(newBase) API_BASE_URL = newBase.replace(/\/$/, '');
        const newModel = modelNameInput.value.trim();
        if(newModel) MODEL_NAME = newModel;
        API_KEYS = {
            builder: apiKeyBuilderInput.value.trim(),
            critic: apiKeyCriticInput.value.trim()
        };
        const maxR = parseInt(maxRoundsInput.value, 10);
        if(!isNaN(maxR) && maxR > 0) MAX_ROUNDS = Math.min(maxR, 20);
        roundInfoSpan.innerText = `⚙️ 最大轮数: ${MAX_ROUNDS}`;
        
        localStorage.setItem('triple_ai_settings_v2', JSON.stringify({
            baseUrl: API_BASE_URL,
            model: MODEL_NAME,
            apiKeys: API_KEYS,
            maxRounds: MAX_ROUNDS
        }));
        updateStatus('设置已保存');
    }

    function loadSettings() {
        const saved = localStorage.getItem('triple_ai_settings_v2');
        if(saved) {
            try {
                const s = JSON.parse(saved);
                if(s.baseUrl) API_BASE_URL = s.baseUrl;
                if(s.model) MODEL_NAME = s.model;
                if(s.apiKeys) API_KEYS = s.apiKeys;
                if(s.maxRounds) MAX_ROUNDS = s.maxRounds;
                backendUrlInput.value = API_BASE_URL;
                modelNameInput.value = MODEL_NAME;
                apiKeyBuilderInput.value = API_KEYS.builder || '';
                apiKeyCriticInput.value = API_KEYS.critic || '';
                maxRoundsInput.value = MAX_ROUNDS;
                roundInfoSpan.innerText = `⚙️ 最大轮数: ${MAX_ROUNDS}`;
            } catch(e) {}
        } else {
            backendUrlInput.value = API_BASE_URL;
            modelNameInput.value = MODEL_NAME;
            maxRoundsInput.value = MAX_ROUNDS;
        }
    }

    async function testConnection() {
        const url = backendUrlInput.value.trim();
        if(!url) { testResultSpan.innerText = '❌ 请输入Base URL'; return; }
        const model = modelNameInput.value.trim() || 'gpt-3.5-turbo';
        const testKey = apiKeyBuilderInput.value.trim() || apiKeyCriticInput.value.trim();
        if(!testKey) { testResultSpan.innerText = '❌ 请至少填写一个 API Key 进行测试'; return; }
        testResultSpan.innerText = '⏳ 测试中...';
        try {
            const testUrl = `${url.replace(/\/$/, '')}/chat/completions`;
            const response = await fetch(testUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${testKey}`
                },
                body: JSON.stringify({
                    model: model,
                    messages: [{ role: 'user', content: 'Hi' }],
                    max_tokens: 5
                })
            });
            if(response.ok) {
                testResultSpan.innerText = '✅ API 连通正常';
                testResultSpan.style.color = '#10b981';
            } else {
                const err = await response.text();
                testResultSpan.innerText = `⚠️ ${response.status}`;
                testResultSpan.style.color = '#ef4444';
            }
        } catch(e) {
            testResultSpan.innerText = `❌ 连接失败: ${e.message}`;
            testResultSpan.style.color = '#ef4444';
        }
    }

    // ======================= 历史会话管理 (沿用原有风格) =======================
    function autoSaveSession() {
        if(fullHistory.length === 0) return;
        const sessionId = `session_${Date.now()}_${fullHistory.length}`;
        let sessions = JSON.parse(localStorage.getItem('triple_ai_sessions_v2') || '[]');
        const title = fullHistory[0]?.content.substring(0, 28) || '未命名辩论';
        const newSession = {
            id: sessionId,
            title: title,
            history: [...fullHistory],
            lastUpdated: new Date().toISOString()
        };
        // 简单去重策略：按最新保存替换当前（避免无限堆积），实际保留最近20条
        sessions = sessions.filter(s => s.id !== 'current_temp');
        sessions.unshift(newSession);
        if(sessions.length > 20) sessions = sessions.slice(0,20);
        localStorage.setItem('triple_ai_sessions_v2', JSON.stringify(sessions));
        renderHistoryList();
    }

    function loadSession(sessionId) {
        if(debateActive) { updateStatus('请先终止辩论再加载会话'); return; }
        const sessions = JSON.parse(localStorage.getItem('triple_ai_sessions_v2') || '[]');
        const session = sessions.find(s => s.id === sessionId);
        if(session) {
            fullHistory = session.history;
            renderFullConversation();
            updateStatus(`已加载: ${session.title}`);
        }
    }

    function deleteSession(sessionId) {
        let sessions = JSON.parse(localStorage.getItem('triple_ai_sessions_v2') || '[]');
        sessions = sessions.filter(s => s.id !== sessionId);
        localStorage.setItem('triple_ai_sessions_v2', JSON.stringify(sessions));
        if(fullHistory.length === 0) renderHistoryList();
        else renderHistoryList();
        if(sessions.length === 0) document.getElementById('historyList').innerHTML = '<div class="history-item">暂无历史</div>';
    }

    function renderHistoryList() {
        const historyDiv = document.getElementById('historyList');
        if(!historyDiv) return;
        const sessions = JSON.parse(localStorage.getItem('triple_ai_sessions_v2') || '[]');
        if(sessions.length === 0) {
            historyDiv.innerHTML = '<div class="history-item">暂无历史</div>';
            return;
        }
        historyDiv.innerHTML = '';
        sessions.slice(0,15).forEach(session => {
            const div = document.createElement('div');
            div.className = 'history-item';
            const contentDiv = document.createElement('div');
            contentDiv.style.cursor = 'pointer';
            contentDiv.innerHTML = `<div class="history-title">${escapeHtml(session.title)}</div><div class="history-time">${new Date(session.lastUpdated).toLocaleString()}</div>`;
            contentDiv.onclick = () => loadSession(session.id);
            div.appendChild(contentDiv);
            const delBtn = document.createElement('button');
            delBtn.innerHTML = '🗑️';
            delBtn.className = 'delete-session';
            delBtn.onclick = (e) => { e.stopPropagation(); if(confirm('删除会话?')) deleteSession(session.id); };
            div.appendChild(delBtn);
            historyDiv.appendChild(div);
        });
    }

    // ======================= 事件绑定 =======================
    sendBtn.onclick = sendUserMessageAndStartDebate;
    stopBtn.onclick = stopDebate;
    resetBtn.onclick = resetConversation;
    newChatBtn.onclick = newConversation;
    settingsBtn.onclick = () => settingsModal.classList.add('active');
    closeSettingsBtn.onclick = () => settingsModal.classList.remove('active');
    saveSettingsBtn.onclick = () => { saveSettings(); settingsModal.classList.remove('active'); };
    testBackendBtn.onclick = testConnection;
    settingsModal.onclick = (e) => { if(e.target === settingsModal) settingsModal.classList.remove('active'); };
    inputBox.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendUserMessageAndStartDebate(); } });
    
    // 启动
    loadSettings();
    renderHistoryList();
    if(fullHistory.length === 0) resetConversation();
    updateUIForDebateEnd();
</script>
</body>
</html>
