<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双AI智囊团</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f7f9fc;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* 顶部状态栏 */
        .status-bar {
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 24px;
            font-size: 14px;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .status-badge {
            background: #e2e8f0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        /* 主体布局 */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        /* 侧边栏（历史） */
        .sidebar {
            width: 260px;
            background: #fff;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .sidebar-header {
            padding: 16px;
            font-weight: 600;
            border-bottom: 1px solid #e2e8f0;
        }
        .history-list {
            flex: 1;
            padding: 12px;
        }
        .history-item {
            padding: 12px;
            margin-bottom: 8px;
            background: #f8fafc;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .history-item:hover {
            background: #eef2ff;
        }
        .history-item.active {
            background: #e0e7ff;
            border-left: 3px solid #3b82f6;
        }
        /* 聊天区域 */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            align-self: flex-start;
        }
        .message.user {
            align-self: flex-end;
        }
        .message.builder, .message.critic {
            background: #fff;
            border-radius: 12px;
            padding: 12px 16px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .message.user .bubble {
            background: #3b82f6;
            color: white;
            border-radius: 18px;
            padding: 10px 16px;
        }
        .message-role {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #475569;
        }
        .message-content {
            line-height: 1.5;
            white-space: pre-wrap;
        }
        /* 输入区域 */
        .input-area {
            background: #fff;
            border-top: 1px solid #e2e8f0;
            padding: 16px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .input-box {
            flex: 1;
            border: 1px solid #cbd5e1;
            border-radius: 24px;
            padding: 12px 16px;
            resize: none;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }
        .input-box:focus {
            border-color: #3b82f6;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 24px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .control-bar {
            display: flex;
            gap: 12px;
            padding: 12px 20px;
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
        }
        .control-bar button {
            background: #f1f5f9;
            color: #1e293b;
        }
        .control-bar button.primary {
            background: #3b82f6;
            color: white;
        }
        .settings-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            width: 400px;
            padding: 24px;
        }
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 12px 0;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
        }
    </style>
</head>
<body>
<div class="status-bar">
    <span>🤖 双AI智囊团</span>
    <span class="status-badge" id="statusText">就绪</span>
</div>
<div class="main-layout">
    <div class="sidebar">
        <div class="sidebar-header">历史会话</div>
        <div class="history-list" id="historyList">
            <!-- 动态加载历史 -->
        </div>
    </div>
    <div class="chat-area">
        <div class="control-bar">
            <button id="pauseBtn" disabled>⏸️ 暂停</button>
            <button id="resumeBtn" disabled>▶️ 继续</button>
            <button id="stopBtn" disabled>🛑 停止并总结</button>
            <button id="resetBtn">🔄 重置对话</button>
        </div>
        <div class="messages-container" id="messagesContainer">
            <!-- 对话消息显示区 -->
        </div>
        <div class="input-area">
            <textarea class="input-box" id="inputBox" rows="2" placeholder="输入你的问题..."></textarea>
            <button id="sendBtn">发送</button>
        </div>
    </div>
</div>
<div class="settings-btn" id="settingsBtn">⚙️</div>

<div class="modal" id="settingsModal">
    <div class="modal-content">
        <h3>API 设置</h3>
        <label>DeepSeek API Key:</label>
        <input type="password" id="apiKeyInput" placeholder="sk-...">
        <label>后端地址 (http://...):</label>
        <input type="text" id="backendUrlInput" placeholder="https://your-backend.railway.app">
        <button id="saveSettingsBtn">保存</button>
        <button id="closeModalBtn">关闭</button>
    </div>
</div>

<script>
    // 全局状态
    let currentSessionId = null;
    let messages = [];          // 当前会话消息
    let isDiscussing = false;   // 是否正在自动循环
    let round = 0;              // 当前轮次
    let maxRounds = 10;
    let pauseRequested = false;
    let stopRequested = false;

    // 获取保存的配置
    let apiKey = localStorage.getItem('deepseek_api_key') || '';
    let backendUrl = localStorage.getItem('backend_url') || '';

    // DOM 元素
    const messagesContainer = document.getElementById('messagesContainer');
    const inputBox = document.getElementById('inputBox');
    const sendBtn = document.getElementById('sendBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resumeBtn = document.getElementById('resumeBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resetBtn = document.getElementById('resetBtn');
    const statusText = document.getElementById('statusText');
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsModal = document.getElementById('settingsModal');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const backendUrlInput = document.getElementById('backendUrlInput');
    const saveSettingsBtn = document.getElementById('saveSettingsBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');

    // 辅助函数
    function updateStatus(text) {
        statusText.innerText = text;
    }

    function scrollToBottom() {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // 渲染消息
    function renderMessages() {
        messagesContainer.innerHTML = '';
        messages.forEach(msg => {
            const div = document.createElement('div');
            div.className = `message ${msg.role}`;
            const roleName = {
                'user': '👤 我',
                'builder': '🏗️ 构建者 (DeepSeek)',
                'critic': '🔍 批判者 (DeepSeek)',
                'system_summary': '📝 总结'
            }[msg.role] || msg.role;
            div.innerHTML = `
                <div class="message-role">${roleName}</div>
                <div class="bubble message-content">${escapeHtml(msg.content)}</div>
            `;
            messagesContainer.appendChild(div);
        });
        scrollToBottom();
    }

    function escapeHtml(text) {
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/\n/g, '<br>');
    }

    // 添加消息到本地
    function addMessage(role, content, roundNum = null) {
        messages.push({ role, content, round: roundNum });
        renderMessages();
    }

    // 调用后端 API（需要后端服务）
    async function callAPI(endpoint, data) {
        if (!backendUrl) throw new Error('请先设置后端地址');
        const url = `${backendUrl}${endpoint}`;
        const headers = {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token') || ''}`
        };
        const response = await fetch(url, {
            method: 'POST',
            headers,
            body: JSON.stringify(data)
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
    }

    // 开始新讨论
    async function startDiscussion(question) {
        if (!apiKey) {
            alert('请先在设置中填写 DeepSeek API Key');
            return;
        }
        if (!backendUrl) {
            alert('请先在设置中填写后端地址');
            return;
        }
        // 清除旧状态
        messages = [];
        addMessage('user', question);
        isDiscussing = true;
        pauseRequested = false;
        stopRequested = false;
        round = 0;
        updateStatus('第1轮讨论中...');
        // 调用后端开始循环
        try {
            // 这里需要后端提供 /api/discussion/start 接口
            // 我们暂时用前端模拟调用，但实际需要后端支持
            // 由于我们还没有部署后端，这里先模拟一个提示
            alert('后端尚未部署，请先完成 Railway 后端部署。\n部署后请将后端地址填入设置。');
            isDiscussing = false;
        } catch (err) {
            console.error(err);
            alert('启动讨论失败：' + err.message);
            isDiscussing = false;
        }
    }

    // 暂停
    function pauseDiscussion() {
        if (!isDiscussing) return;
        pauseRequested = true;
        updateStatus('已暂停');
        isDiscussing = false;
    }

    // 继续
    function resumeDiscussion() {
        if (pauseRequested) {
            pauseRequested = false;
            isDiscussing = true;
            updateStatus('继续讨论...');
            // 这里需要重新发起一轮请求
        }
    }

    // 停止并生成总结
    function stopAndSummarize() {
        stopRequested = true;
        isDiscussing = false;
        updateStatus('正在生成总结...');
        // 调用后端总结接口
    }

    // 重置对话
    function resetDiscussion() {
        messages = [];
        renderMessages();
        isDiscussing = false;
        pauseRequested = false;
        stopRequested = false;
        round = 0;
        updateStatus('就绪');
    }

    // 保存设置
    function saveSettings() {
        const newApiKey = apiKeyInput.value.trim();
        const newBackendUrl = backendUrlInput.value.trim();
        if (newApiKey) localStorage.setItem('deepseek_api_key', newApiKey);
        if (newBackendUrl) localStorage.setItem('backend_url', newBackendUrl);
        apiKey = newApiKey;
        backendUrl = newBackendUrl;
        settingsModal.style.display = 'none';
        alert('设置已保存');
    }

    // 事件绑定
    sendBtn.onclick = () => {
        const question = inputBox.value.trim();
        if (!question) return;
        inputBox.value = '';
        startDiscussion(question);
    };
    pauseBtn.onclick = pauseDiscussion;
    resumeBtn.onclick = resumeDiscussion;
    stopBtn.onclick = stopAndSummarize;
    resetBtn.onclick = resetDiscussion;
    settingsBtn.onclick = () => {
        apiKeyInput.value = apiKey;
        backendUrlInput.value = backendUrl;
        settingsModal.style.display = 'flex';
    };
    saveSettingsBtn.onclick = saveSettings;
    closeModalBtn.onclick = () => settingsModal.style.display = 'none';
    window.onclick = (e) => { if (e.target === settingsModal) settingsModal.style.display = 'none'; };

    // 初始加载
    if (apiKey) apiKeyInput.value = apiKey;
    if (backendUrl) backendUrlInput.value = backendUrl;
</script>
</body>
</html>
