<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双AI智囊团</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f7f9fc;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .status-bar {
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 24px;
            font-size: 14px;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .status-badge {
            background: #e2e8f0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 260px;
            background: #fff;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .sidebar-header {
            padding: 16px;
            font-weight: 600;
            border-bottom: 1px solid #e2e8f0;
        }
        .history-list {
            flex: 1;
            padding: 12px;
        }
        .history-item {
            padding: 12px;
            margin-bottom: 8px;
            background: #f8fafc;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .history-item:hover {
            background: #eef2ff;
        }
        .history-item.active {
            background: #e0e7ff;
            border-left: 3px solid #3b82f6;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .control-bar {
            display: flex;
            gap: 12px;
            padding: 12px 20px;
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
        }
        .control-bar button {
            background: #f1f5f9;
            color: #1e293b;
            border: none;
            border-radius: 24px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        .control-bar button.primary {
            background: #3b82f6;
            color: white;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            align-self: flex-start;
        }
        .message.user {
            align-self: flex-end;
        }
        .message.builder, .message.critic {
            background: #fff;
            border-radius: 12px;
            padding: 12px 16px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .message.user .bubble {
            background: #3b82f6;
            color: white;
            border-radius: 18px;
            padding: 10px 16px;
        }
        .message-role {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #475569;
        }
        .message-content {
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .input-area {
            background: #fff;
            border-top: 1px solid #e2e8f0;
            padding: 16px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .input-box {
            flex: 1;
            border: 1px solid #cbd5e1;
            border-radius: 24px;
            padding: 12px 16px;
            resize: none;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }
        .input-box:focus {
            border-color: #3b82f6;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 24px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<div class="status-bar">
    <span>🤖 双AI智囊团</span>
    <span class="status-badge" id="statusText">就绪</span>
</div>
<div class="main-layout">
    <div class="sidebar">
        <div class="sidebar-header">历史会话</div>
        <div class="history-list" id="historyList">
            <div class="history-item">会话示例</div>
        </div>
    </div>
    <div class="chat-area">
        <div class="control-bar">
            <button id="pauseBtn" disabled>⏸️ 暂停</button>
            <button id="resumeBtn" disabled>▶️ 继续</button>
            <button id="stopBtn" disabled>🛑 停止并总结</button>
            <button id="resetBtn">🔄 重置对话</button>
        </div>
        <div class="messages-container" id="messagesContainer">
            <!-- 消息列表 -->
        </div>
        <div class="input-area">
            <textarea class="input-box" id="inputBox" rows="2" placeholder="输入你的问题..."></textarea>
            <button id="sendBtn">发送</button>
        </div>
    </div>
</div>

<script>
    // 固定后端地址（无需再手动配置）
    const BACKEND_URL = 'https://dual-ai-backend-production.up.railway.app';

    // 全局状态
    let currentSessionId = null;
    let messages = [];
    let isDiscussing = false;
    let round = 0;
    let maxRounds = 10;
    let pauseRequested = false;
    let stopRequested = false;

    const messagesContainer = document.getElementById('messagesContainer');
    const inputBox = document.getElementById('inputBox');
    const sendBtn = document.getElementById('sendBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resumeBtn = document.getElementById('resumeBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resetBtn = document.getElementById('resetBtn');
    const statusText = document.getElementById('statusText');

    function updateStatus(text) {
        statusText.innerText = text;
    }

    function scrollToBottom() {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function escapeHtml(text) {
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/\n/g, '<br>');
    }

    function renderMessages() {
        messagesContainer.innerHTML = '';
        messages.forEach(msg => {
            const div = document.createElement('div');
            div.className = `message ${msg.role}`;
            let roleName = '';
            if (msg.role === 'user') roleName = '👤 我';
            else if (msg.role === 'builder') roleName = '🏗️ 构建者';
            else if (msg.role === 'critic') roleName = '🔍 批判者';
            else if (msg.role === 'system_summary') roleName = '📝 总结';
            else roleName = msg.role;
            div.innerHTML = `
                <div class="message-role">${roleName}</div>
                <div class="bubble message-content">${escapeHtml(msg.content)}</div>
            `;
            messagesContainer.appendChild(div);
        });
        scrollToBottom();
    }

    function addMessage(role, content, roundNum = null) {
        messages.push({ role, content, round: roundNum });
        renderMessages();
    }

    async function callAPI(endpoint, data) {
        const url = `${BACKEND_URL}${endpoint}`;
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
    }

    async function startDiscussion(question) {
        if (!question) return;
        // 清空旧状态
        messages = [];
        addMessage('user', question);
        isDiscussing = true;
        pauseRequested = false;
        stopRequested = false;
        round = 0;
        updateStatus('第1轮讨论中...');
        pauseBtn.disabled = false;
        resumeBtn.disabled = true;
        stopBtn.disabled = false;
        sendBtn.disabled = true;
        try {
            // 调用后端 /api/start，注意不再传递 apiKey
            const result = await callAPI('/api/start', {
                question: question,
                maxRounds: maxRounds
            });
            if (result.history) {
                // 将后端返回的历史消息添加到前端（跳过第一条用户消息，因为已经添加）
                for (let i = 1; i < result.history.length; i++) {
                    const msg = result.history[i];
                    addMessage(msg.role, msg.content);
                }
                updateStatus('讨论结束');
                // 如果讨论结束，自动生成总结
                if (result.finished) {
                    stopDiscussionAndSummarize();
                }
            }
        } catch (err) {
            console.error(err);
            addMessage('system_summary', `错误: ${err.message}`);
            updateStatus('出错');
        } finally {
            isDiscussing = false;
            pauseBtn.disabled = true;
            resumeBtn.disabled = true;
            stopBtn.disabled = true;
            sendBtn.disabled = false;
        }
    }

    async function stopDiscussionAndSummarize() {
        if (messages.length === 0) return;
        updateStatus('正在生成总结...');
        try {
            // 使用完整的消息历史（不包含总结本身）
            const historyForSummary = messages.filter(m => m.role !== 'system_summary');
            const result = await callAPI('/api/summarize', { history: historyForSummary });
            if (result.summary) {
                addMessage('system_summary', result.summary);
            }
        } catch (err) {
            addMessage('system_summary', `总结失败: ${err.message}`);
        } finally {
            updateStatus('就绪');
        }
    }

    function resetDiscussion() {
        messages = [];
        renderMessages();
        isDiscussing = false;
        pauseRequested = false;
        stopRequested = false;
        round = 0;
        updateStatus('就绪');
        pauseBtn.disabled = true;
        resumeBtn.disabled = true;
        stopBtn.disabled = true;
        sendBtn.disabled = false;
    }

    sendBtn.onclick = () => {
        const question = inputBox.value.trim();
        if (!question) return;
        inputBox.value = '';
        startDiscussion(question);
    };
    pauseBtn.onclick = () => {
        if (!isDiscussing) return;
        pauseRequested = true;
        updateStatus('已暂停');
        isDiscussing = false;
        pauseBtn.disabled = true;
        resumeBtn.disabled = false;
    };
    resumeBtn.onclick = () => {
        if (!pauseRequested) return;
        pauseRequested = false;
        isDiscussing = true;
        updateStatus('继续讨论...');
        pauseBtn.disabled = false;
        resumeBtn.disabled = true;
        // 这里需要重新发起一轮请求，但为简化，可以提示用户手动重新发送问题
        // 由于我们目前没有保存对话状态，先简单提示
        addMessage('system_summary', '暂不支持继续功能，请重新发送问题。');
        resetDiscussion();
    };
    stopBtn.onclick = () => {
        if (messages.length === 0) return;
        stopDiscussionAndSummarize();
        isDiscussing = false;
        pauseBtn.disabled = true;
        resumeBtn.disabled = true;
        stopBtn.disabled = true;
    };
    resetBtn.onclick = resetDiscussion;
</script>
</body>
</html>
