<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三AI智囊团 · 连续对话优化版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f7f9fc;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .status-bar {
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 24px;
            font-size: 14px;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: space-between;
        }
        .status-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .status-badge {
            background: #e2e8f0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .settings-btn {
            background: #f1f5f9;
            border: none;
            border-radius: 20px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 280px;
            background: #fff;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .sidebar-header {
            padding: 16px;
            font-weight: 600;
            border-bottom: 1px solid #e2e8f0;
        }
        .history-list {
            flex: 1;
            padding: 12px;
        }
        .history-item {
            position: relative;
            background: #f8fafc;
            border-radius: 8px;
            margin-bottom: 8px;
            padding: 10px 32px 10px 12px;
            transition: background 0.2s;
            cursor: pointer;
        }
        .history-item:hover {
            background: #eef2ff;
        }
        .history-item.active {
            background: #e0e7ff;
            border-left: 3px solid #3b82f6;
        }
        .history-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            word-break: break-word;
        }
        .history-time {
            font-size: 11px;
            color: #64748b;
        }
        .delete-session {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 6px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .delete-session:hover {
            background: #fee2e2;
            color: #ef4444;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .control-bar {
            display: flex;
            gap: 12px;
            padding: 12px 20px;
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            flex-wrap: wrap;
        }
        .control-bar button {
            background: #f1f5f9;
            color: #1e293b;
            border: none;
            border-radius: 24px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        .control-bar button.primary {
            background: #3b82f6;
            color: white;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            align-self: flex-start;
        }
        .message.user {
            align-self: flex-end;
        }
        .message.user .bubble {
            background: #3b82f6;
            color: white;
            border-radius: 18px;
            padding: 10px 16px;
        }
        .message.builder, .message.critic, .message.system_summary {
            background: #fff;
            border-radius: 12px;
            padding: 12px 16px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .message-role {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #475569;
        }
        .message-content {
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .input-area {
            background: #fff;
            border-top: 1px solid #e2e8f0;
            padding: 16px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .input-box {
            flex: 1;
            border: 1px solid #cbd5e1;
            border-radius: 24px;
            padding: 12px 16px;
            resize: none;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }
        .input-box:focus {
            border-color: #3b82f6;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 24px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #fff;
            border-radius: 20px;
            width: 500px;
            max-width: 90%;
            padding: 24px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }
        .modal-content h3 {
            margin-bottom: 20px;
            font-size: 20px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #1e293b;
        }
        .form-group input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
        }
        .test-btn {
            background: #e2e8f0;
            color: #1e293b;
            padding: 6px 12px;
            font-size: 12px;
        }
        .test-status {
            font-size: 12px;
            margin-left: 8px;
            color: #10b981;
        }
        hr {
            margin: 16px 0;
            border-color: #e2e8f0;
        }
    </style>
</head>
<body>
<div class="status-bar">
    <div class="status-left">
        <span>🤖 三AI智囊团 · 连续对话优化版</span>
        <span class="status-badge" id="statusText">就绪</span>
    </div>
    <button class="settings-btn" id="settingsBtn">⚙️ 设置</button>
</div>
<div class="main-layout">
    <div class="sidebar">
        <div class="sidebar-header">📚 历史会话</div>
        <div class="history-list" id="historyList">
            <div class="history-item">加载中...</div>
        </div>
    </div>
    <div class="chat-area">
        <div class="control-bar">
            <button id="stopBtn" disabled>🛑 终止本轮辩论</button>
            <button id="newChatBtn">➕ 新建对话</button>
            <button id="resetBtn">🗑️ 清空对话</button>
        </div>
        <div class="messages-container" id="messagesContainer">
            <!-- 动态消息 -->
        </div>
        <div class="input-area">
            <textarea class="input-box" id="inputBox" rows="2" placeholder="输入你的问题... (首次提问 / 继续追问)"></textarea>
            <button id="sendBtn">发送</button>
        </div>
    </div>
</div>

<!-- 设置模态框 -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>⚙️ 设置</h3>
        <div class="form-group">
            <label>后端接口地址</label>
            <input type="text" id="backendUrlInput" placeholder="https://your-backend.com">
            <div style="margin-top: 8px;">
                <button type="button" class="test-btn" id="testBackendBtn">测试连接</button>
                <span id="testResult" class="test-status"></span>
            </div>
        </div>
        <hr>
        <div class="form-group">
            <label>🔑 Builder API Key (api1)</label>
            <input type="password" id="apiKeyBuilder" placeholder="sk-...">
        </div>
        <div class="form-group">
            <label>🔑 Critic API Key (api2)</label>
            <input type="password" id="apiKeyCritic" placeholder="sk-...">
        </div>
        <div class="form-group">
            <label>🔑 Observer API Key (api3)</label>
            <input type="password" id="apiKeyObserver" placeholder="sk-... (可选)">
        </div>
        <div class="modal-buttons">
            <button id="closeSettingsBtn">取消</button>
            <button id="saveSettingsBtn">保存</button>
        </div>
    </div>
</div>

<script>
    // ======================= 全局变量 =======================
    let BACKEND_URL = 'https://dual-ai-backend-production.up.railway.app'; // 默认
    let API_KEYS = {
        builder: '',
        critic: '',
        observer: ''
    };
    let fullHistory = [];            // 存储所有 user/builder/critic 消息（不含总结）
    let currentSessionId = null;     // 当前辩论 sessionId（用于终止）
    let isDiscussing = false;        // 是否正在辩论中
    let maxRounds = 10;              // 每轮最大辩论回合数

    // DOM 元素
    const messagesContainer = document.getElementById('messagesContainer');
    const inputBox = document.getElementById('inputBox');
    const sendBtn = document.getElementById('sendBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resetBtn = document.getElementById('resetBtn');
    const newChatBtn = document.getElementById('newChatBtn');
    const statusText = document.getElementById('statusText');
    const settingsModal = document.getElementById('settingsModal');
    const settingsBtn = document.getElementById('settingsBtn');
    const closeSettingsBtn = document.getElementById('closeSettingsBtn');
    const saveSettingsBtn = document.getElementById('saveSettingsBtn');
    const testBackendBtn = document.getElementById('testBackendBtn');
    const testResultSpan = document.getElementById('testResult');
    const backendUrlInput = document.getElementById('backendUrlInput');
    const apiKeyBuilderInput = document.getElementById('apiKeyBuilder');
    const apiKeyCriticInput = document.getElementById('apiKeyCritic');
    const apiKeyObserverInput = document.getElementById('apiKeyObserver');

    // ======================= 辅助函数 =======================
    function updateStatus(text) {
        statusText.innerText = text;
    }

    function scrollToBottom() {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function escapeHtml(text) {
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/\n/g, '<br>');
    }

    // 创建消息DOM
    function createMessageElement(role, content) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        let roleName = '';
        if (role === 'user') roleName = '👤 我';
        else if (role === 'builder') roleName = '🏗️ 构建者';
        else if (role === 'critic') roleName = '🔍 批判者';
        else if (role === 'system_summary') roleName = '📝 总结';
        else roleName = role;
        div.innerHTML = `
            <div class="message-role">${roleName}</div>
            <div class="bubble message-content">${escapeHtml(content)}</div>
        `;
        return div;
    }

    // 渲染整个对话（基于 fullHistory）
    function renderFullConversation() {
        messagesContainer.innerHTML = '';
        fullHistory.forEach(msg => {
            const el = createMessageElement(msg.role, msg.content);
            messagesContainer.appendChild(el);
        });
        scrollToBottom();
        autoSave();
    }

    // 追加单条消息（用于总结或新增辩论消息）
    function appendMessageToUI(role, content, saveToHistory = true) {
        const el = createMessageElement(role, content);
        messagesContainer.appendChild(el);
        scrollToBottom();
        if (saveToHistory && role !== 'system_summary') {
            fullHistory.push({ role, content });
            autoSave();
        }
    }

    // 追加多条消息（用于批量添加后端返回的新辩论内容，避免重复添加用户消息）
    function appendMessagesToUI(messages) {
        messages.forEach(msg => {
            const el = createMessageElement(msg.role, msg.content);
            messagesContainer.appendChild(el);
        });
        scrollToBottom();
        // 更新 fullHistory：需要合并，但注意不要重复添加用户消息（因为用户消息已乐观添加）
        // 简单起见，重新从后端返回的完整历史设置 fullHistory 并重新渲染，但为了避免闪烁，我们只追加新消息
        // 为了准确，这里我们采用重新设置 fullHistory 并整体渲染，但这样会有短暂闪烁，但逻辑简单可靠
        // 考虑到性能，可以接受
        fullHistory = messages;
        renderFullConversation();
    }

    // 清空消息UI
    function clearMessagesUI() {
        messagesContainer.innerHTML = '';
    }

    // ======================= 后端交互 =======================
    async function callAPI(endpoint, data) {
        const url = `${BACKEND_URL}${endpoint}`;
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        if (!response.ok) {
            const errText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errText}`);
        }
        return await response.json();
    }

    // 生成总结（基于当前 fullHistory）
    async function generateSummary() {
        if (fullHistory.length === 0) {
            updateStatus('无对话内容，无法总结');
            return;
        }
        updateStatus('正在生成总结...');
        try {
            const result = await callAPI('/api/summarize', {
                history: fullHistory,
                apiKeys: API_KEYS
            });
            if (result.summary) {
                appendMessageToUI('system_summary', result.summary, false);
            } else {
                appendMessageToUI('system_summary', '总结生成失败，请重试。', false);
            }
        } catch (err) {
            console.error(err);
            appendMessageToUI('system_summary', `总结错误: ${err.message}`, false);
        } finally {
            updateStatus('就绪');
        }
    }

    // 开始辩论（首次 或 继续）
    async function startDiscussion(question, previousHistory = null) {
        if (!question.trim()) return;
        // 检查API Key
        if (!API_KEYS.builder || !API_KEYS.critic) {
            appendMessageToUI('system_summary', '⚠️ 请在设置中填写 Builder 和 Critic 的 API Key', false);
            settingsModal.classList.add('active');
            return;
        }

        isDiscussing = true;
        updateUIForDebateStart();

        // 乐观更新：立即显示用户消息（如果 previousHistory 存在，说明是继续对话，需要先确保界面已显示旧历史）
        if (!previousHistory) {
            // 全新对话：清空历史和界面，然后添加用户消息
            fullHistory = [];
            clearMessagesUI();
        }
        // 添加用户消息到界面和历史（乐观更新）
        appendMessageToUI('user', question, true);

        const payload = {
            question: question,
            maxRounds: maxRounds,
            apiKeys: API_KEYS
        };
        if (previousHistory) {
            payload.history = previousHistory;
        }

        try {
            const result = await callAPI('/api/start', payload);
            currentSessionId = result.sessionId;

            if (result.history) {
                // 后端返回的完整历史包含了用户消息 + 辩论内容
                // 为了避免重复显示用户消息，我们直接替换 fullHistory 并重新渲染
                fullHistory = result.history;
                renderFullConversation();
            }

            if (result.finished) {
                updateStatus('辩论已结束，正在总结...');
                await generateSummary();
            } else {
                updateStatus('辩论中断');
            }
        } catch (err) {
            console.error(err);
            appendMessageToUI('system_summary', `辩论出错: ${err.message}`, false);
            updateStatus('错误');
        } finally {
            isDiscussing = false;
            updateUIForDebateEnd();
        }
    }

    // 继续提问（基于已有历史）
    async function continueDiscussion() {
        const newQuestion = inputBox.value.trim();
        if (!newQuestion) return;
        if (fullHistory.length === 0) {
            await startDiscussion(newQuestion, null);
        } else {
            await startDiscussion(newQuestion, fullHistory);
        }
        inputBox.value = '';
    }

    // 终止当前辩论
    async function terminateCurrentDebate() {
        if (!currentSessionId) {
            updateStatus('没有活跃辩论');
            return;
        }
        try {
            const url = `${BACKEND_URL}/api/stop/${currentSessionId}`;
            const response = await fetch(url, { method: 'POST' });
            if (response.ok) {
                updateStatus('已发送终止请求，辩论将停止');
                appendMessageToUI('system_summary', '🛑 用户手动终止辩论', false);
            } else {
                updateStatus('终止失败');
            }
        } catch (err) {
            console.error(err);
            updateStatus('终止请求失败');
        }
    }

    // 重置对话（清空历史，清空界面）
    function resetConversation() {
        if (isDiscussing) {
            updateStatus('请先终止当前辩论再清空');
            return;
        }
        fullHistory = [];
        currentSessionId = null;
        clearMessagesUI();
        updateStatus('对话已清空');
        renderHistoryList();
    }

    // 新建对话：完全重置
    function newConversation() {
        if (isDiscussing) {
            updateStatus('请先终止当前辩论再新建对话');
            return;
        }
        fullHistory = [];
        currentSessionId = null;
        clearMessagesUI();
        updateStatus('已创建新对话');
        renderHistoryList();
    }

    // ======================= UI状态控制 =======================
    function updateUIForDebateStart() {
        sendBtn.disabled = true;
        stopBtn.disabled = false;
        resetBtn.disabled = true;
        newChatBtn.disabled = true;
        updateStatus('辩论进行中...');
    }

    function updateUIForDebateEnd() {
        sendBtn.disabled = false;
        stopBtn.disabled = true;
        resetBtn.disabled = false;
        newChatBtn.disabled = false;
        if (!isDiscussing) updateStatus('就绪');
    }

    // ======================= 设置相关 =======================
    function saveSettings() {
        const newBackend = backendUrlInput.value.trim();
        if (newBackend) BACKEND_URL = newBackend;
        API_KEYS = {
            builder: apiKeyBuilderInput.value.trim(),
            critic: apiKeyCriticInput.value.trim(),
            observer: apiKeyObserverInput.value.trim()
        };
        localStorage.setItem('ai_settings', JSON.stringify({
            backendUrl: BACKEND_URL,
            apiKeys: API_KEYS
        }));
        updateStatus('设置已保存');
    }

    function loadSettings() {
        const saved = localStorage.getItem('ai_settings');
        if (saved) {
            try {
                const settings = JSON.parse(saved);
                if (settings.backendUrl) {
                    BACKEND_URL = settings.backendUrl;
                    backendUrlInput.value = BACKEND_URL;
                }
                if (settings.apiKeys) {
                    API_KEYS = settings.apiKeys;
                    apiKeyBuilderInput.value = API_KEYS.builder || '';
                    apiKeyCriticInput.value = API_KEYS.critic || '';
                    apiKeyObserverInput.value = API_KEYS.observer || '';
                }
            } catch(e) { console.warn(e); }
        } else {
            backendUrlInput.value = BACKEND_URL;
        }
    }

    async function testBackendConnection() {
        const url = backendUrlInput.value.trim();
        if (!url) {
            testResultSpan.innerText = '❌ 请输入后端地址';
            return;
        }
        testResultSpan.innerText = '⏳ 测试中...';
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);
            const response = await fetch(`${url}/health`, { signal: controller.signal });
            clearTimeout(timeoutId);
            if (response.ok) {
                const data = await response.json();
                testResultSpan.innerText = '✅ 连接成功';
                testResultSpan.style.color = '#10b981';
            } else {
                testResultSpan.innerText = `❌ HTTP ${response.status}`;
                testResultSpan.style.color = '#ef4444';
            }
        } catch (err) {
            testResultSpan.innerText = `❌ 连接失败: ${err.message}`;
            testResultSpan.style.color = '#ef4444';
        }
    }

    // ======================= 历史会话存储与删除 =======================
    function saveCurrentSessionToLocal() {
        if (fullHistory.length === 0) return;
        const sessionId = currentSessionId || Date.now().toString();
        const sessionData = {
            id: sessionId,
            title: fullHistory[0]?.content.substring(0, 30) || '未命名会话',
            history: fullHistory,
            lastUpdated: new Date().toISOString()
        };
        let sessions = JSON.parse(localStorage.getItem('triple_ai_sessions') || '[]');
        const existingIndex = sessions.findIndex(s => s.id === sessionId);
        if (existingIndex !== -1) {
            sessions[existingIndex] = sessionData;
        } else {
            sessions.push(sessionData);
        }
        if (sessions.length > 20) sessions = sessions.slice(-20);
        localStorage.setItem('triple_ai_sessions', JSON.stringify(sessions));
        renderHistoryList();
    }

    function deleteSessionById(sessionId) {
        let sessions = JSON.parse(localStorage.getItem('triple_ai_sessions') || '[]');
        const newSessions = sessions.filter(s => s.id !== sessionId);
        localStorage.setItem('triple_ai_sessions', JSON.stringify(newSessions));
        
        if (currentSessionId === sessionId) {
            fullHistory = [];
            currentSessionId = null;
            clearMessagesUI();
            updateStatus('会话已删除');
        }
        
        renderHistoryList();
        if (newSessions.length === 0) {
            document.getElementById('historyList').innerHTML = '<div class="history-item">暂无历史</div>';
        }
    }

    function loadSessionFromLocal(sessionId) {
        if (isDiscussing) {
            updateStatus('请先终止当前辩论再加载会话');
            return;
        }
        const sessions = JSON.parse(localStorage.getItem('triple_ai_sessions') || '[]');
        const session = sessions.find(s => s.id === sessionId);
        if (session) {
            fullHistory = session.history;
            currentSessionId = session.id;
            renderFullConversation();
            updateStatus(`已加载会话: ${session.title}`);
        }
    }

    function renderHistoryList() {
        const historyList = document.getElementById('historyList');
        if (!historyList) return;
        const sessions = JSON.parse(localStorage.getItem('triple_ai_sessions') || '[]');
        if (sessions.length === 0) {
            historyList.innerHTML = '<div class="history-item">暂无历史</div>';
            return;
        }
        historyList.innerHTML = '';
        sessions.slice().reverse().forEach(session => {
            const div = document.createElement('div');
            div.className = 'history-item';
            if (session.id === currentSessionId) div.classList.add('active');
            
            const contentDiv = document.createElement('div');
            contentDiv.style.cursor = 'pointer';
            contentDiv.style.paddingRight = '30px';
            contentDiv.innerHTML = `
                <div class="history-title">${escapeHtml(session.title)}</div>
                <div class="history-time">${new Date(session.lastUpdated).toLocaleString()}</div>
            `;
            contentDiv.onclick = (e) => {
                e.stopPropagation();
                loadSessionFromLocal(session.id);
            };
            div.appendChild(contentDiv);
            
            const delBtn = document.createElement('button');
            delBtn.innerHTML = '🗑️';
            delBtn.className = 'delete-session';
            delBtn.title = '删除此会话';
            delBtn.onclick = (e) => {
                e.stopPropagation();
                if (confirm('确定删除这个历史会话吗？')) {
                    deleteSessionById(session.id);
                }
            };
            div.appendChild(delBtn);
            
            historyList.appendChild(div);
        });
    }

    function autoSave() {
        if (fullHistory.length > 0) {
            saveCurrentSessionToLocal();
        } else {
            if (currentSessionId) {
                let sessions = JSON.parse(localStorage.getItem('triple_ai_sessions') || '[]');
                const filtered = sessions.filter(s => s.id !== currentSessionId);
                localStorage.setItem('triple_ai_sessions', JSON.stringify(filtered));
                currentSessionId = null;
                renderHistoryList();
            }
        }
    }

    // ======================= 事件绑定 =======================
    sendBtn.onclick = () => {
        if (isDiscussing) {
            updateStatus('辩论进行中，请等待结束');
            return;
        }
        const question = inputBox.value.trim();
        if (!question) return;
        inputBox.value = '';
        if (fullHistory.length === 0) {
            startDiscussion(question, null);
        } else {
            continueDiscussion();
        }
    };

    stopBtn.onclick = () => {
        if (isDiscussing) {
            terminateCurrentDebate();
        } else {
            updateStatus('没有活跃辩论');
        }
    };

    resetBtn.onclick = () => {
        resetConversation();
    };

    newChatBtn.onclick = () => {
        newConversation();
    };

    settingsBtn.onclick = () => {
        backendUrlInput.value = BACKEND_URL;
        apiKeyBuilderInput.value = API_KEYS.builder || '';
        apiKeyCriticInput.value = API_KEYS.critic || '';
        apiKeyObserverInput.value = API_KEYS.observer || '';
        settingsModal.classList.add('active');
    };
    closeSettingsBtn.onclick = () => settingsModal.classList.remove('active');
    saveSettingsBtn.onclick = () => {
        saveSettings();
        settingsModal.classList.remove('active');
    };
    testBackendBtn.onclick = testBackendConnection;
    settingsModal.onclick = (e) => {
        if (e.target === settingsModal) settingsModal.classList.remove('active');
    };

    // 初始化
    loadSettings();
    renderHistoryList();
    const sessions = JSON.parse(localStorage.getItem('triple_ai_sessions') || '[]');
    if (sessions.length > 0) {
        loadSessionFromLocal(sessions[sessions.length - 1].id);
    } else {
        newConversation();
    }
    updateUIForDebateEnd();
</script>
</body>
</html>
